<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="exercise10.css">
<title>Exercise 10</title>
</head>
<body>
<h2>Simple Grid</h2>
<div class="simple-grid">
<div class="grid-item">Rose</div>
<div class="grid-item">Tulip</div>
<div class="grid-item">Sunflower</div>
<div class="grid-item">Daisy</div>
</div>
<h2>Grid with Template Columns & Rows</h2>
<div class="grid-template">
<div class="grid-item">Lavender</div>
<div class="grid-item">Marigold</div>
<div class="grid-item">Poppy</div>
<div class="grid-item">Orchid</div>
</div>
<h2>Grid Template Areas</h2>
<div class="grid-areas">
<div class="header">Header</div>
<div class="sidebar">Sidebar</div>
<div class="main">Main Content</div>
<div class="footer">Footer</div>
</div>
<h2>Item Alignment</h2>
<div class="grid-align">
<div class="item">Iris</div>
<div class="item">Peony</div>
<div class="item">Begonia</div>
<div class="item">Hibiscus</div>
</div>
<a href="index.html" class="home-btn">Back to Home</a>
</body>
</html>
