<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="exercise4.css">
<title>Exercise 4</title>
</head>
<body>
<h2>Float Collapse with Clearfix</h2>
<div class="clearfix collapse-demo">
<div class="box left">Box 1</div>
<div class="box right">Box 2</div>
</div>
<h2>Equal Height Columns</h2>
<div class="clearfix equal-height">
<div class="col">Column 1</div>
<div class="col">Column 2</div>
<div class="col">Column 3</div>
</div>
<h2>Float-Based Grid System</h2>
<div class="clearfix grid">
<div class="grid-item">1</div>
<div class="grid-item">2</div>
<div class="grid-item">3</div>
<div class="grid-item">4</div>
<div class="grid-item">5</div>
<div class="grid-item">6</div>
</div>
<h2>Responsive Floats</h2>
<div class="clearfix responsive-grid">
<div class="resp-col">A</div>
<div class="resp-col">B</div>
<div class="resp-col">C</div>
<div class="resp-col">D</div>
</div>
<a href="index.html" class="home-btn">Back to Home</a>
</body>
</html>
