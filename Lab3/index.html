<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Lab Home</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
}
h1 {
    color: #2c3e50;
    margin-bottom: 50px;
    text-align: center;
}
ul {
    list-style: none;
    padding: 0;
    display: flex;
    gap: 40px;
}
li {
    text-align: center;
}
a {
    display: block;
    padding: 40px 80px;
    background-color: #3498db;
    color: white;
    font-size: 24px;
    font-weight: bold;
    border-radius: 12px;
    text-decoration: none;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: transform 0.3s, background-color 0.3s;
}
a:hover {
    background-color: #005fa3;
    transform: translateY(-5px);
}
</style>
</head>
