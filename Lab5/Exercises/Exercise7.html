<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="exercise7.css">
<title>Exercise 7</title>
</head>
<body>
<h2>Flex Container (Row)</h2>
<div class="flex-row">
<div class="flex-item">Rose</div>
<div class="flex-item">Tulip</div>
<div class="flex-item">Sunflower</div>
</div>
<h2>Flex Direction Examples</h2>
<div class="flex-column">
<div class="flex-item">Lavender</div>
<div class="flex-item">Daisy</div>
<div class="flex-item">Marigold</div>
</div>
<h2>Flex Wrap Example</h2>
<div class="flex-wrap">
<div class="flex-item">Poppy</div>
<div class="flex-item">Orchid</div>
<div class="flex-item">Lily</div>
<div class="flex-item">Hibiscus</div>
<div class="flex-item">Chrysanthemum</div>
</div>
<h2>Justify Content & Align Items</h2>
<div class="flex-justify">
<div class="flex-item">Iris</div>
<div class="flex-item">Peony</div>
<div class="flex-item">Begonia</div>
</div>
